steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

  # Update Cloud Run Job with new image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'jobs'
      - 'update'
      - 'contacts-refiner'
      - '--image'
      - '${_IMAGE}'
      - '--region'
      - 'europe-west1'
      - '--update-env-vars'
      - 'ENVIRONMENT=cloud,ENABLE_FOLLOWUP_SCORING=true,ENABLE_CRM_SYNC=true'

substitutions:
  _IMAGE: 'europe-west1-docker.pkg.dev/${PROJECT_ID}/app/refiner:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
